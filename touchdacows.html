    let currentPage = 0;
    
    function ppg() {
      currentPage -= 1;
      elements.b_next.disabled = false;
      if (currentPage <= 0) {
        elements.b_prev.disabled = true;
      }
      
      upg()
    }
    
    function npg() {
      currentPage += 1;
      elements.b_prev.disabled = false;
      if (currentPage >= pages.total) {
        elements.b_next.disabled = true;
      }
      
      upg()
    }
    
    function upg() {
      if (pages.left[currentPage] != 0) {
        elements.left_page.style.display = 'block';
        elements.left_page.innerHTML = pages.left[currentPage];
      }
      
      if (pages.right[currentPage] != 0) {
        elements.right_page.style.display = 'block';
        elements.right_page.innerHTML = pages.right[currentPage];
      }
      
      if (pages.left[currentPage] == 0) {
        elements.left_page.style.display = 'none';
      }
      if (pages.right[currentPage] == 0) {
        elements.right_page.style.display = 'none';
      }
    }

  <style>
    button, .r, .cb, label {
      cursor: pointer;
    }
    
    p {
      text-indent: 20px;
    }
    
    #center {
      position: absolute;
      left: 10px;
      top: 10px;
      width: 50%;
      height: 75%;
      
      font-size: 125%;
    }
    
    #left_page {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 50%;
      
      border-style: solid;
      border-color: black gray black black;
      border-width: 1px;
    }
    
    #right_page {
      position: absolute;
      left: calc(50% + 1px);
      top: 0;
      height: 100%;
      width: 50%;
      
      border-style: solid;
      border-color: black black black gray;
      border-width: 1px;
    }
    
    #turn_left {
      position: absolute;
      left: 10px;
      bottom: 10px;
    }
    
    #turn_right {
      position: absolute;
      right: 10px;
      bottom: 10px;
    }
  </style>
</head>
<body>
  <div id="center">
    <div id="left_page" style="display:none"></div>
    <div id="right_page"></div>
  </div>
  <button id="turn_left" onclick="ppg();" disabled>Previous page</button>
  <button id="turn_right" onclick="npg();">Next page</button>
  <script>
    const elements = {
      "left_page": document.getElementById('left_page'),
      "right_page": document.getElementById('right_page'),
      "b_prev": document.getElementById('turn_left'),
      "b_next": document.getElementById('turn_right')
    }
    
    upg()
  </script>
</body>
